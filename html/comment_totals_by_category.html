<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>D3 Sentiment Bubble Chart - CSV Data</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      background-color: #FFFEF6;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }
    .controls { margin-bottom: 20px; }
    button {
      background-color: #2c3e50; color: white; border: 1px solid #4ca1af;
      padding: 10px 20px; margin: 0 10px; cursor: pointer;
      border-radius: 4px; font-size: 14px; transition: background 0.2s;
    }
    button:hover { background-color: #34495e; }
    .tooltip {
      position: absolute; background-color: #535353;
      color: #FFFEF6; padding: 15px; border-radius: 6px; pointer-events: none;
      font-size: 14px; box-shadow: 0 8px 16px #FFFEF6;
      max-width: 250px; border: 1px solid #3a4a5a; opacity: 0;
      transition: opacity 0.2s; z-index: 10;
    }
    .tooltip .author { margin: 0 0 5px 0; font-weight: bold; color: #e0e0e0; }
    .tooltip .text { margin: 0 0 10px 0; line-height: 1.4; color: #cccccc; }
    .tooltip .stats { font-size: 12px; color: #8899aa; margin: 0; }
    .cluster-label { font-weight: bold; font-size: 16px; letter-spacing: 2px; pointer-events: none; }
  </style>
</head>
<body>

<div class="controls">
  <button id="btn-group">Group by Sentiment</button>
  <button id="btn-combine">Combine All</button>
  <button id="download-btn">Download SVG</button>
</div>

<div id="chart"></div>
<div id="tooltip" class="tooltip"></div>

<script>
  const width = 1200;
  const height = 800;

  const svg = d3.select("#chart")
    .append("svg")
    .attr("width", width)
    .attr("height", height);

  const tooltip = d3.select("#tooltip");

  function downloadSVG(svgElement, filename = 'd3-dots.svg') {
      // 1. Ensure the SVG has the proper XML namespaces for Illustrator/Vector programs
      if (!svgElement.getAttribute('xmlns')) {
          svgElement.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      }
      if (!svgElement.getAttribute('xmlns:xlink')) {
          svgElement.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
      }

      // 2. Serialize the SVG DOM element into a string
      const serializer = new XMLSerializer();
      const svgString = serializer.serializeToString(svgElement);

      // 3. Create a Blob and trigger the download
      const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      
      // Clean up
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
}

    // --- LOAD CSV DATA HERE ---
    // Make sure the path matches where your CSV is saved relative to this HTML file
    d3.csv("./data/df_comment_totals_by_category.csv").then(rawData => {
      
      // 1. Expand the data (1 node per 10 comments)
      let data = [];
      rawData.forEach(d => {
        let count = +d.count;
        let numBubbles = Math.floor(count / 10);
        for (let i = 0; i < numBubbles; i++) {
          data.push({ ai_guess: d.ai_guess, originalCount: count });
        }
      });

      // 2. Scales and Colors
      const colors = {
        'positive_user_describing_changes': '#ff7f0e',
        'question': '#1f77b4',
        'positive_user_made_as_written': '#2ca02c',
        'thinks_recipe_is_flawed_due_to_technique_or_equipment': '#d62728',
        'thinks_recipe_is_flawed_due_to_flavor': '#9467bd',
        'maybe_not_about_the_recipe': '#8c564b',
        'thinks_recipe_is_flawed_due_to_cooking_time': '#e377c2',
        'user_responding_to_other_user': '#7f7f7f',
        'thinks_recipe_is_inauthentic': '#bcbd22',
        'thinks_ingredients_hard_to_find': '#17becf'
      };

      const centers = {
        'positive_user_describing_changes': { x: width * 0.2, y: height * 0.25 },
        'question': { x: width * 0.5, y: height * 0.25 },
        'positive_user_made_as_written': { x: width * 0.8, y: height * 0.25 },
        'thinks_recipe_is_flawed_due_to_technique_or_equipment': { x: width * 0.2, y: height * 0.5 },
        'thinks_recipe_is_flawed_due_to_flavor': { x: width * 0.5, y: height * 0.5 },
        'maybe_not_about_the_recipe': { x: width * 0.8, y: height * 0.5 },
        'thinks_recipe_is_flawed_due_to_cooking_time': { x: width * 0.2, y: height * 0.75 },
        'user_responding_to_other_user': { x: width * 0.4, y: height * 0.75 },
        'thinks_recipe_is_inauthentic': { x: width * 0.6, y: height * 0.75 },
        'thinks_ingredients_hard_to_find': { x: width * 0.8, y: height * 0.75 }
      };

      // 3. Draw Labels
      const labels = svg.selectAll('.cluster-label')
        .data(Object.keys(centers))
        .enter().append('text')
        .attr('class', 'cluster-label')
        .attr('text-anchor', 'middle')
        .attr('fill', d => colors[d])
        .text(d => d.replace(/_/g, ' ').toUpperCase())
        .attr('x', d => centers[d].x)
        .attr('y', d => centers[d].y - 80)
        .style('opacity', 0)
        .style('font-size', '10px');

  // 1. Forces
  const forceXGroup = d3.forceX(d => centers[d.ai_guess].x).strength(0.08);
  const forceYGroup = d3.forceY(d => centers[d.ai_guess].y).strength(0.08);

  const forceXCombine = d3.forceX(width / 2).strength(0.05);
  const forceYCombine = d3.forceY(height / 2).strength(0.05);

  // 2. Soften the collision
  const collideForce = d3.forceCollide(2.5) // radius is 2, +0.5 padding
    .iterations(2)
    .strength(0.8); 

  // 3. Keep a mild repulsion to space them out naturally
  const chargeForce = d3.forceManyBody().strength(-0.5);

  // 4. Build the simulation
  const simulation = d3.forceSimulation(data)
    .force('x', forceXCombine)
    .force('y', forceYCombine)
    .force('collide', collideForce)
    .force('charge', chargeForce)
    .alphaDecay(0.02);

      // 5. Draw Circles
      const nodes = svg.selectAll("circle")
        .data(data)
        .enter().append("circle")
        .attr("r", 2) // constant small radius
        .attr("fill", d => colors[d.ai_guess] || '#ccc')
        .style("cursor", "pointer")
        
        // Tooltip Interaction
        .on("mouseover", function(event, d) {
          d3.select(this).attr("stroke", "#535353").attr("stroke-width", 1.5);
          tooltip.style("opacity", 1)
            .html(`
              <p class="author">Category: ${d.ai_guess.replace(/_/g, ' ')}</p>
              <p class="stats">Represents 10 comments (Total: ${d.originalCount})</p>
            `);
        })
      .on("mousemove", function(event) {
        tooltip
          .style("left", (event.pageX + 15) + "px")
          .style("top", (event.pageY - 15) + "px");
      })
      .on("mouseout", function() {
        d3.select(this).attr("stroke", "#192530").attr("stroke-width", 0);
        tooltip.style("opacity", 0);
      });

    // Update positions on every tick
    simulation.on("tick", () => {
      nodes
        .attr("cx", d => d.x)
        .attr("cy", d => d.y);
    });

    // 6. Button Interactivity (Toggling Layouts)
    d3.select("#btn-group").on("click", () => {
      labels.transition().duration(200).style('opacity', 1);
      simulation.force('x', forceXGroup).force('y', forceYGroup).alpha(0.8).restart();
    });

    d3.select("#btn-combine").on("click", () => {
      labels.transition().duration(200).style('opacity', 0);
      simulation.force('x', forceXCombine).force('y', forceYCombine).alpha(0.8).restart();
    });

  }).catch(error => {
    console.error("Error loading the CSV file:", error);
    d3.select("#chart").append("p").text("Error loading data. Check the console.").style("color", "red");
  });

  d3.select('#download-btn').on('click', () => {
    // Replace 'svg' with your actual D3 SVG selection or class/ID selector
    const svgNode = d3.select('svg').node(); 
    downloadSVG(svgNode, 'circle-packing.svg');
});

</script>
</body>
</html>
